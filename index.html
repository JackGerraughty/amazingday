<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:    #f4a0b0;
      --peach:   #fcd5b0;
      --cream:   #fff8f2;
      --blush:   #fde8e8;
      --gold:    #e8a87c;
      --text:    #5c3d3d;
      --soft:    #c97a8a;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Lora', serif;
      background: radial-gradient(ellipse at 30% 20%, #fde8e8 0%, #fff4ec 40%, #fef0f5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
    }

    /* ── floating petals ── */
    .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .petal {
      position: absolute;
      top: -60px;
      width: 18px; height: 22px;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(0)   rotate(0deg);   opacity: 0; }
      5%   { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── scene card ── */
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(14px);
      border: 1.5px solid rgba(255,200,210,0.5);
      border-radius: 32px;
      padding: 52px 60px 44px;
      max-width: 620px; width: 90%;
      box-shadow: 0 12px 60px rgba(200,100,120,0.12), 0 2px 8px rgba(200,100,120,0.08);
      text-align: center;
      animation: riseIn 1.1s cubic-bezier(.22,.8,.36,1) both;
    }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── bunny scene ── */
    .scene {
      width: 220px; height: 220px;
      margin: 0 auto 28px;
      position: relative;
    }

    /* ground */
    .ground {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 180px; height: 22px;
      background: radial-gradient(ellipse, rgba(220,150,160,0.25) 60%, transparent 100%);
      border-radius: 50%;
    }

    /* bunny body */
    .bunny {
      position: absolute;
      bottom: 18px; left: 50%; transform: translateX(-50%);
      animation: bunnySway 3.2s ease-in-out infinite;
    }
    @keyframes bunnySway {
      0%,100% { transform: translateX(-50%) rotate(-1deg); }
      50%      { transform: translateX(-50%) rotate(1.5deg); }
    }

    /* SVG bunny */
    .bunny svg { display: block; }

    /* bouquet arm */
    .arm-bouquet {
      animation: offerArm 3.2s ease-in-out infinite;
      transform-origin: 52px 62px;
    }
    @keyframes offerArm {
      0%,100% { transform: rotate(0deg); }
      40%      { transform: rotate(-18deg); }
      60%      { transform: rotate(-14deg); }
    }

    /* hearts floating up */
    .hearts { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 80px; pointer-events: none; }
    .heart {
      position: absolute;
      font-size: 18px;
      animation: floatHeart 2.8s ease-in-out infinite;
      opacity: 0;
    }
    .heart:nth-child(1) { left: 30%; animation-delay: 0s; }
    .heart:nth-child(2) { left: 55%; animation-delay: 0.9s; font-size: 13px; }
    .heart:nth-child(3) { left: 15%; animation-delay: 1.6s; font-size: 14px; }
    @keyframes floatHeart {
      0%   { opacity: 0;   transform: translateY(10px) scale(0.8); }
      20%  { opacity: 1; }
      100% { opacity: 0;   transform: translateY(-70px) scale(1.1); }
    }

    /* ── message ── */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--text);
      line-height: 1.3;
      letter-spacing: -0.01em;
      animation: fadeSlide 1.3s 0.4s both;
    }
    .sub {
      margin-top: 14px;
      font-size: 1rem;
      color: var(--soft);
      font-style: italic;
      animation: fadeSlide 1.3s 0.7s both;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── little flowers row ── */
    .flowers-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 28px;
      animation: fadeSlide 1.3s 1s both;
    }
    .flower-icon {
      font-size: 1.5rem;
      display: inline-block;
      animation: wobble 2.5s ease-in-out infinite;
    }
    .flower-icon:nth-child(2) { animation-delay: 0.3s; }
    .flower-icon:nth-child(3) { animation-delay: 0.6s; }
    .flower-icon:nth-child(4) { animation-delay: 0.9s; }
    .flower-icon:nth-child(5) { animation-delay: 1.2s; }
    @keyframes wobble {
      0%,100% { transform: rotate(-6deg) scale(1);    }
      50%      { transform: rotate(6deg)  scale(1.12); }
    }

    /* ── sparkle corners ── */
    .sparkle {
      position: absolute;
      font-size: 1.1rem;
      animation: twinkle 2s ease-in-out infinite;
    }
    .sparkle:nth-child(1) { top: 18px;  left: 22px;  animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 18px;  right: 22px; animation-delay: 0.7s; }
    .sparkle:nth-child(3) { bottom:18px; left: 22px;  animation-delay: 1.4s; }
    .sparkle:nth-child(4) { bottom:18px; right: 22px; animation-delay: 0.4s; }
    @keyframes twinkle {
      0%,100% { opacity: 0.3; transform: scale(0.85) rotate(0deg); }
      50%      { opacity: 1;   transform: scale(1.15) rotate(20deg); }
    }
  </style>
</head>
<body>

  <!-- falling petals -->
  <div class="petals" id="petals"></div>

  <div class="card">
    <span class="sparkle">✨</span>
    <span class="sparkle">✨</span>
    <span class="sparkle">✨</span>
    <span class="sparkle">✨</span>

    <!-- bunny scene -->
    <div class="scene">
      <div class="hearts">
        <span class="heart">💗</span>
        <span class="heart">💕</span>
        <span class="heart">🌸</span>
      </div>

      <div class="bunny">
        <svg width="140" height="160" viewBox="0 0 140 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- ears -->
          <ellipse cx="48" cy="36" rx="10" ry="26" fill="#f9d4d4" transform="rotate(-10 48 36)"/>
          <ellipse cx="48" cy="36" rx="5"  ry="18" fill="#f4a5a5" transform="rotate(-10 48 36)"/>
          <ellipse cx="88" cy="32" rx="10" ry="26" fill="#f9d4d4" transform="rotate(10 88 32)"/>
          <ellipse cx="88" cy="32" rx="5"  ry="18" fill="#f4a5a5" transform="rotate(10 88 32)"/>

          <!-- head -->
          <ellipse cx="68" cy="70" rx="30" ry="28" fill="#fde8e8"/>
          <!-- cheeks -->
          <ellipse cx="52" cy="78" rx="9" ry="6" fill="#f4a5a5" opacity="0.5"/>
          <ellipse cx="84" cy="78" rx="9" ry="6" fill="#f4a5a5" opacity="0.5"/>
          <!-- eyes -->
          <circle cx="58" cy="66" r="5" fill="#5c3d3d"/>
          <circle cx="78" cy="66" r="5" fill="#5c3d3d"/>
          <circle cx="60" cy="64" r="2" fill="white"/>
          <circle cx="80" cy="64" r="2" fill="white"/>
          <!-- nose -->
          <ellipse cx="68" cy="76" rx="4" ry="3" fill="#e88fa0"/>
          <!-- mouth -->
          <path d="M62 80 Q68 86 74 80" stroke="#c97a8a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

          <!-- body -->
          <ellipse cx="68" cy="118" rx="32" ry="30" fill="#fde8e8"/>

          <!-- left arm (plain) -->
          <path d="M38 108 Q22 118 26 132" stroke="#fde8e8" stroke-width="14" stroke-linecap="round" fill="none"/>

          <!-- right arm holding bouquet -->
          <g class="arm-bouquet">
            <path d="M98 108 Q114 115 112 130" stroke="#fde8e8" stroke-width="14" stroke-linecap="round" fill="none"/>
            <!-- bouquet stem -->
            <line x1="112" y1="126" x2="112" y2="152" stroke="#82b070" stroke-width="3" stroke-linecap="round"/>
            <!-- leaves -->
            <ellipse cx="108" cy="142" rx="7" ry="4" fill="#a5c98a" transform="rotate(-30 108 142)"/>
            <ellipse cx="116" cy="138" rx="6" ry="3" fill="#82b070" transform="rotate(25 116 138)"/>
            <!-- flowers -->
            <circle cx="104" cy="118" r="7" fill="#f78ca0"/>
            <circle cx="112" cy="112" r="7" fill="#fcd0a0"/>
            <circle cx="120" cy="118" r="7" fill="#f78ca0"/>
            <circle cx="112" cy="122" r="6" fill="#fff0b0"/>
            <!-- centers -->
            <circle cx="104" cy="118" r="3" fill="#fff0b0"/>
            <circle cx="112" cy="112" r="3" fill="#f4a0b0"/>
            <circle cx="120" cy="118" r="3" fill="#fff0b0"/>
            <circle cx="112" cy="122" r="2.5" fill="#f4a0b0"/>
          </g>

          <!-- feet -->
          <ellipse cx="52" cy="146" rx="14" ry="8" fill="#fcd5c5"/>
          <ellipse cx="84" cy="146" rx="14" ry="8" fill="#fcd5c5"/>

          <!-- tail -->
          <circle cx="32" cy="120" r="10" fill="white" opacity="0.8"/>
        </svg>
      </div>

      <div class="ground"></div>
    </div>

    <h1>Hope You Have An<br/><em>Amazing Day</em> Today 🌸</h1>
    <p class="sub">Thinking of you and sending all the good vibes your way ♡</p>

    <div class="flowers-row">
      <span class="flower-icon">🌷</span>
      <span class="flower-icon">🌸</span>
      <span class="flower-icon">💐</span>
      <span class="flower-icon">🌸</span>
      <span class="flower-icon">🌷</span>
    </div>
  </div>

  <script>
    // generate falling petals
    const container = document.getElementById('petals');
    const colors = ['#f4a0b0','#fcd5b0','#f9d4d4','#f4c2c2','#fde0e8','#fff0b0'];
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.style.left        = Math.random() * 100 + 'vw';
      p.style.width       = (12 + Math.random() * 14) + 'px';
      p.style.height      = (16 + Math.random() * 14) + 'px';
      p.style.background  = colors[Math.floor(Math.random() * colors.length)];
      p.style.borderRadius= Math.random() > 0.5 ? '50% 0 50% 0' : '0 50% 0 50%';
      p.style.animationDuration = (6 + Math.random() * 9) + 's';
      p.style.animationDelay   = (Math.random() * 10) + 's';
      container.appendChild(p);
    }
  </script>
</body>
</html>
