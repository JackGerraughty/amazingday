<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Petit+Formal+Script&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky1: #1a0a2e;
      --gold:  #f5c97a;
      --cream: #fff5ee;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: 'Cormorant Garamond', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* SKY */
    .sky {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(
        to bottom,
        #0f0520 0%, #2a1050 18%, #5c2870 38%,
        #9e4a72 55%, #d4706a 68%, #f0a06a 78%,
        #f8c88a 88%, #fde8b8 100%
      );
    }

    /* STARS */
    .stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .star {
      position: absolute; background: white; border-radius: 50%;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.15; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.3); }
    }

    /* MOON */
    .moon {
      position: fixed; top: 7%; right: 13%; z-index: 2;
      width: 68px; height: 68px; border-radius: 50%;
      background: radial-gradient(circle at 35% 38%, #fff9e6, #f5d97a 55%, #e8b84a);
      box-shadow: 0 0 40px 14px rgba(245,200,100,0.28), 0 0 90px 30px rgba(245,180,80,0.12);
      animation: moonGlow 5s ease-in-out infinite;
    }
    @keyframes moonGlow {
      0%,100% { box-shadow: 0 0 40px 14px rgba(245,200,100,0.22), 0 0 90px 30px rgba(245,180,80,0.08); }
      50%      { box-shadow: 0 0 55px 20px rgba(245,200,100,0.38), 0 0 110px 45px rgba(245,180,80,0.18); }
    }

    /* HILLS */
    .hills { position: fixed; bottom: 0; left: 0; right: 0; z-index: 3; pointer-events: none; }

    /* GLOW ORBS */
    .glow-tl {
      position: fixed; top: -120px; left: -120px; z-index: 2; pointer-events: none;
      width: 380px; height: 380px; border-radius: 50%;
      background: radial-gradient(circle, rgba(200,100,180,0.18), transparent 70%);
      animation: pulseGlow 6s ease-in-out infinite;
    }
    .glow-br {
      position: fixed; bottom: -100px; right: -100px; z-index: 2; pointer-events: none;
      width: 340px; height: 340px; border-radius: 50%;
      background: radial-gradient(circle, rgba(240,160,100,0.15), transparent 70%);
      animation: pulseGlow 7s ease-in-out infinite 1.5s;
    }
    @keyframes pulseGlow {
      0%,100% { transform: scale(1);    opacity: 0.7; }
      50%      { transform: scale(1.12); opacity: 1; }
    }

    /* PARTICLES */
    .particles { position: fixed; inset: 0; z-index: 4; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute; top: -30px;
      animation: drift linear infinite; opacity: 0;
    }
    @keyframes drift {
      0%   { opacity: 0; transform: translateY(0) translateX(0) rotate(0deg) scale(1); }
      8%   { opacity: 1; }
      85%  { opacity: 0.5; }
      100% { opacity: 0; transform: translateY(105vh) translateX(var(--dx)) rotate(var(--rot)) scale(0.8); }
    }

    /* CARD */
    .card {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      animation: cardReveal 1.6s cubic-bezier(.16,1,.3,1) both;
      padding: 20px;
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(50px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* GLASS PANEL */
    .glass {
      background: rgba(255,245,238,0.08);
      backdrop-filter: blur(22px) saturate(1.5);
      border: 1px solid rgba(255,220,200,0.2);
      border-radius: 40px;
      padding: 38px 56px 34px;
      max-width: 580px; width: 90vw;
      text-align: center;
      box-shadow: 0 8px 60px rgba(0,0,0,0.38), 0 2px 6px rgba(0,0,0,0.2),
                  inset 0 1px 0 rgba(255,255,255,0.14);
      position: relative; overflow: hidden;
    }
    .glass::before {
      content: '';
      position: absolute; top: -60%; left: -30%;
      width: 60%; height: 120%;
      background: linear-gradient(105deg, transparent, rgba(255,255,255,0.04) 50%, transparent);
      transform: skewX(-20deg);
      animation: shimmer 7s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100% { opacity: 0; } 50% { opacity: 1; } }

    /* BUNNY SCENE */
    .scene-wrap {
      width: 200px; height: 200px;
      position: relative; margin: 0 auto 8px;
      filter: drop-shadow(0 14px 28px rgba(0,0,0,0.3));
    }
    .bunny-group {
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      animation: gentleBob 3.6s ease-in-out infinite;
    }
    @keyframes gentleBob {
      0%,100% { transform: translateX(-50%) translateY(0)   rotate(-.8deg); }
      50%      { transform: translateX(-50%) translateY(-6px) rotate(.8deg); }
    }
    .bouquet-arm {
      transform-origin: 60px 80px;
      animation: offerBouquet 3.6s ease-in-out infinite;
    }
    @keyframes offerBouquet {
      0%,100% { transform: rotate(0deg);   }
      45%      { transform: rotate(-22deg); }
      55%      { transform: rotate(-20deg); }
    }

    /* FLOATING HEARTS */
    .floating-love {
      position: absolute; top: -10px; left: 50%;
      transform: translateX(-50%);
      width: 140px; height: 60px; pointer-events: none;
    }
    .lv { position: absolute; animation: riseHeart ease-in-out infinite; opacity: 0; font-size: 16px; }
    .lv:nth-child(1) { left: 18%; animation-duration: 2.8s; animation-delay: 0s; }
    .lv:nth-child(2) { left: 46%; animation-duration: 3.2s; animation-delay: 1s;   font-size: 12px; }
    .lv:nth-child(3) { left: 70%; animation-duration: 2.6s; animation-delay: 1.8s; font-size: 13px; }
    @keyframes riseHeart {
      0%   { opacity: 0; transform: translateY(8px) scale(0.7); }
      15%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-60px) scale(1.05); }
    }

    /* TYPOGRAPHY */
    .label {
      font-family: 'Petit Formal Script', cursive;
      color: var(--gold); font-size: 1rem; letter-spacing: 0.04em;
      opacity: 0.88; margin-bottom: 10px;
      animation: fadeUp 1s 0.8s both; display: block;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: clamp(1.8rem, 5vw, 2.75rem);
      line-height: 1.22; color: #fff5ee; letter-spacing: 0.01em;
      animation: fadeUp 1s 1s both;
    }
    h1 em { font-style: italic; font-weight: 400; color: var(--gold); }
    .sub {
      margin-top: 14px; font-size: 1.05rem; font-style: italic;
      font-weight: 300; color: rgba(255,220,200,0.72); line-height: 1.65;
      animation: fadeUp 1s 1.2s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .divider {
      width: 100%; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,200,160,0.32), transparent);
      margin: 20px 0; animation: fadeUp 1s 1.1s both;
    }

    /* FLOWER ROW */
    .flower-row {
      display: flex; gap: 12px; justify-content: center;
      animation: fadeUp 1s 1.4s both; margin-top: 4px;
    }
    .fi {
      font-size: 1.4rem; display: inline-block;
      animation: petalSway 3s ease-in-out infinite;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    }
    .fi:nth-child(1){animation-delay:0s}
    .fi:nth-child(2){animation-delay:.35s}
    .fi:nth-child(3){animation-delay:.7s}
    .fi:nth-child(4){animation-delay:1.05s}
    .fi:nth-child(5){animation-delay:1.4s}
    @keyframes petalSway {
      0%,100% { transform: rotate(-7deg) scale(1);    }
      50%      { transform: rotate(7deg)  scale(1.15); }
    }
  </style>
</head>
<body>

  <div class="sky"></div>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>
  <div class="stars" id="stars"></div>
  <div class="moon"></div>

  <div class="hills">
    <svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"
         preserveAspectRatio="none" style="width:100%;display:block;">
      <path d="M0,200 C200,120 400,260 600,180 C800,100 1000,220 1200,160 C1320,130 1400,180 1440,160 L1440,320 L0,320 Z"
            fill="rgba(10,4,28,0.65)"/>
      <path d="M0,240 C180,180 360,270 560,220 C740,170 900,260 1100,210 C1260,170 1380,230 1440,210 L1440,320 L0,320 Z"
            fill="rgba(8,3,22,0.82)"/>
      <path d="M0,278 C120,258 280,298 440,278 C600,258 760,294 920,276 C1080,258 1260,288 1440,274 L1440,320 L0,320 Z"
            fill="rgba(5,2,14,0.94)"/>
    </svg>
  </div>

  <div class="particles" id="particles"></div>

  <div class="card">
    <div class="glass">

      <div class="floating-love">
        <span class="lv">💗</span>
        <span class="lv">✨</span>
        <span class="lv">🌸</span>
      </div>

      <!-- bunny -->
      <div class="scene-wrap">
        <div class="bunny-group">
          <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">

            <!-- ears -->
            <ellipse cx="72" cy="48" rx="13" ry="34" fill="#f0c8cc" transform="rotate(-14 72 48)"/>
            <ellipse cx="72" cy="48" rx="7"  ry="22" fill="#e8909a" transform="rotate(-14 72 48)"/>
            <ellipse cx="114" cy="44" rx="13" ry="34" fill="#f0c8cc" transform="rotate(14 114 44)"/>
            <ellipse cx="114" cy="44" rx="7"  ry="22" fill="#e8909a" transform="rotate(14 114 44)"/>

            <!-- head -->
            <ellipse cx="93" cy="94" rx="38" ry="35" fill="#fbe8ec"/>
            <ellipse cx="80" cy="86" rx="22" ry="18" fill="rgba(255,255,255,0.28)"/>

            <!-- cheeks -->
            <ellipse cx="72"  cy="104" rx="11" ry="7" fill="#f4a0b0" opacity="0.5"/>
            <ellipse cx="114" cy="104" rx="11" ry="7" fill="#f4a0b0" opacity="0.5"/>

            <!-- eyes -->
            <circle cx="80"  cy="88" r="6.5" fill="#3b1f2e"/>
            <circle cx="106" cy="88" r="6.5" fill="#3b1f2e"/>
            <circle cx="82.5" cy="85.5" r="2.5" fill="white"/>
            <circle cx="108.5" cy="85.5" r="2.5" fill="white"/>
            <circle cx="81"  cy="90" r="1" fill="rgba(255,255,255,0.45)"/>
            <circle cx="107" cy="90" r="1" fill="rgba(255,255,255,0.45)"/>

            <!-- nose + mouth -->
            <ellipse cx="93" cy="100" rx="5" ry="3.5" fill="#e07888"/>
            <circle cx="91" cy="101" r="1.2" fill="rgba(0,0,0,0.18)"/>
            <circle cx="95" cy="101" r="1.2" fill="rgba(0,0,0,0.18)"/>
            <path d="M86 106 Q93 114 100 106" stroke="#c97a8a" stroke-width="2" fill="none" stroke-linecap="round"/>
            <line x1="93" y1="103" x2="93" y2="107" stroke="#c97a8a" stroke-width="1.5" stroke-linecap="round"/>

            <!-- whiskers -->
            <line x1="56" y1="100" x2="78" y2="102" stroke="rgba(180,120,130,0.45)" stroke-width="1" stroke-linecap="round"/>
            <line x1="56" y1="105" x2="78" y2="104" stroke="rgba(180,120,130,0.45)" stroke-width="1" stroke-linecap="round"/>
            <line x1="108" y1="102" x2="130" y2="100" stroke="rgba(180,120,130,0.45)" stroke-width="1" stroke-linecap="round"/>
            <line x1="108" y1="104" x2="130" y2="105" stroke="rgba(180,120,130,0.45)" stroke-width="1" stroke-linecap="round"/>

            <!-- body -->
            <ellipse cx="93" cy="158" rx="42" ry="38" fill="#fbe8ec"/>
            <ellipse cx="78" cy="142" rx="20" ry="16" fill="rgba(255,255,255,0.22)"/>

            <!-- tail -->
            <circle cx="50" cy="155" r="13" fill="white" opacity="0.9"/>
            <circle cx="50" cy="155" r="9"  fill="white"/>

            <!-- left arm -->
            <path d="M55 138 Q34 152 40 170" stroke="#fbe8ec" stroke-width="17" stroke-linecap="round" fill="none"/>
            <ellipse cx="40" cy="170" rx="10" ry="7" fill="#f4c8cc"/>

            <!-- right arm + bouquet -->
            <g class="bouquet-arm">
              <path d="M130 138 Q152 148 148 167" stroke="#fbe8ec" stroke-width="17" stroke-linecap="round" fill="none"/>
              <ellipse cx="148" cy="167" rx="10" ry="7" fill="#f4c8cc"/>

              <!-- stems -->
              <line x1="148" y1="163" x2="146" y2="192" stroke="#6aad58" stroke-width="3.5" stroke-linecap="round"/>
              <line x1="148" y1="163" x2="153" y2="190" stroke="#5a9848" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="148" y1="163" x2="140" y2="188" stroke="#7aba66" stroke-width="2"   stroke-linecap="round"/>

              <!-- leaves -->
              <ellipse cx="142" cy="178" rx="9" ry="4.5" fill="#88c470" transform="rotate(-40 142 178)"/>
              <ellipse cx="154" cy="174" rx="8" ry="4"   fill="#6aad58" transform="rotate(30  154 174)"/>

              <!-- pink flower -->
              <g transform="translate(136,138)">
                <circle r="5" fill="#f9c0d0" transform="rotate(0)   translate(0,-8)"/>
                <circle r="5" fill="#f9c0d0" transform="rotate(72)  translate(0,-8)"/>
                <circle r="5" fill="#f9c0d0" transform="rotate(144) translate(0,-8)"/>
                <circle r="5" fill="#f9c0d0" transform="rotate(216) translate(0,-8)"/>
                <circle r="5" fill="#f9c0d0" transform="rotate(288) translate(0,-8)"/>
                <circle r="7" fill="#ffe8b0"/>
              </g>
              <!-- peach flower -->
              <g transform="translate(153,132)">
                <circle r="5" fill="#fcd0a8" transform="rotate(0)   translate(0,-8)"/>
                <circle r="5" fill="#fcd0a8" transform="rotate(60)  translate(0,-8)"/>
                <circle r="5" fill="#fcd0a8" transform="rotate(120) translate(0,-8)"/>
                <circle r="5" fill="#fcd0a8" transform="rotate(180) translate(0,-8)"/>
                <circle r="5" fill="#fcd0a8" transform="rotate(240) translate(0,-8)"/>
                <circle r="5" fill="#fcd0a8" transform="rotate(300) translate(0,-8)"/>
                <circle r="7" fill="#f5c46a"/>
              </g>
              <!-- rose flower (top) -->
              <g transform="translate(146,123)">
                <circle r="5" fill="#f07890" transform="rotate(0)   translate(0,-8)"/>
                <circle r="5" fill="#f07890" transform="rotate(72)  translate(0,-8)"/>
                <circle r="5" fill="#f07890" transform="rotate(144) translate(0,-8)"/>
                <circle r="5" fill="#f07890" transform="rotate(216) translate(0,-8)"/>
                <circle r="5" fill="#f07890" transform="rotate(288) translate(0,-8)"/>
                <circle r="7" fill="#fff0b0"/>
              </g>
              <!-- tiny accent buds -->
              <circle cx="130" cy="130" r="5" fill="#c8a8e8"/>
              <circle cx="130" cy="130" r="3" fill="#e8d0f8"/>
              <circle cx="160" cy="143" r="4" fill="#f4b0c8"/>
              <circle cx="160" cy="143" r="2.5" fill="#fde0ec"/>
            </g>

            <!-- feet -->
            <ellipse cx="73"  cy="192" rx="18" ry="9" fill="#f4c8cc"/>
            <ellipse cx="113" cy="192" rx="18" ry="9" fill="#f4c8cc"/>
            <line x1="67" y1="195" x2="67" y2="198" stroke="#e8a0aa" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="73" y1="197" x2="73" y2="200" stroke="#e8a0aa" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="79" y1="195" x2="79" y2="198" stroke="#e8a0aa" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="107" y1="195" x2="107" y2="198" stroke="#e8a0aa" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="113" y1="197" x2="113" y2="200" stroke="#e8a0aa" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="119" y1="195" x2="119" y2="198" stroke="#e8a0aa" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <span class="label">a little something for you ✦</span>
      <h1>Hope You Have An<br/><em>Amazing Day</em> Today</h1>
      <div class="divider"></div>
      <p class="sub">Wishing you nothing but warmth, smiles,<br/>and all the things that make you happy ♡</p>

      <div class="flower-row">
        <span class="fi">🌷</span>
        <span class="fi">🌸</span>
        <span class="fi">💐</span>
        <span class="fi">🌸</span>
        <span class="fi">🌷</span>
      </div>
    </div>
  </div>

  <script>
    // stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 90; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = 0.8 + Math.random() * 2.2;
      s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*65}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*6}s;`;
      starsEl.appendChild(s);
    }

    // particles
    const pEl = document.getElementById('particles');
    const emojis = ['🌸','✨','💫','🌷','💕','⭐'];
    const plain  = ['✦','·','✧','★','♡'];
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const isEmoji = Math.random() > 0.5;
      const src = isEmoji ? emojis : plain;
      p.textContent = src[Math.floor(Math.random()*src.length)];
      const dx = (Math.random()-.5)*180;
      const rot = (Math.random()-.5)*540;
      const sz = isEmoji ? 10+Math.random()*14 : 10+Math.random()*18;
      p.style.cssText = `left:${Math.random()*100}vw;font-size:${sz}px;color:${isEmoji?'inherit':'rgba(255,220,180,0.7)'};--dx:${dx}px;--rot:${rot}deg;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*14}s;`;
      pEl.appendChild(p);
    }
  </script>
</body>
</html>
